document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>You unlocked the Atlas · Search Atlas MCP<\u002Ftitle>\n\n\n\n<style>\n/* ── Fonts ──────────────────────────────────────────────────── */\n@font-face { font-family:\"Inter Tight\"; src:url(\"19797481-2e0f-40fc-8b8f-453e608af16d\") format(\"truetype\"); font-weight:400; font-style:normal; font-display:swap; }\n@font-face { font-family:\"Inter Tight\"; src:url(\"1ed063ff-8220-4247-852d-894ea7e125c1\") format(\"truetype\"); font-weight:500; font-style:normal; font-display:swap; }\n@font-face { font-family:\"Inter Tight\"; src:url(\"7ce9bed6-86bb-4881-b92f-b546477e7215\") format(\"truetype\"); font-weight:500; font-style:italic; font-display:swap; }\n@font-face { font-family:\"Inter Tight\"; src:url(\"ede742eb-37ab-45d6-a5d0-73d50eb0e9ab\") format(\"truetype\"); font-weight:600; font-style:normal; font-display:swap; }\n\n/* ── Tokens (Search Atlas) ──────────────────────────────────── */\n:root {\n  --sa-bg:#000;\n  --sa-surface-1:#0B0B0B;\n  --sa-surface-2:#0F0F0F;\n  --sa-white:#fff;\n  --sa-fg-1:#fff;\n  --sa-fg-2:rgb(255 255 255 / .88);\n  --sa-fg-3:rgb(255 255 255 / .60);\n  --sa-fg-4:rgb(255 255 255 / .48);\n  --sa-fg-5:rgb(255 255 255 / .32);\n  --sa-fg-6:rgb(255 255 255 / .12);\n  --sa-tint-2:rgb(255 255 255 / .02);\n  --sa-tint-6:rgb(255 255 255 / .06);\n  --sa-tint-12:rgb(255 255 255 / .12);\n  --sa-stroke-1:rgb(255 255 255 / .12);\n  --sa-stroke-purple-soft:rgb(170 133 236 / .24);\n  --sa-stroke-purple-medium:rgb(170 133 236 / .48);\n\n  --sa-purple-300:#BC98FF;\n  --sa-purple-400:#AA85EC;\n  --sa-purple-500:#936BD9;\n  --sa-purple-700:#6D00DA;\n  --sa-purple-800:#3D0080;\n  --sa-mint-400:#00FFD4;\n\n  --sa-font: \"Inter Tight\", system-ui, sans-serif;\n  --sa-mono: ui-monospace, \"SF Mono\", \"Menlo\", monospace;\n\n  --sa-radius-sm:8px;\n  --sa-radius-md:12px;\n  --sa-radius-lg:20px;\n  --sa-radius-xl:32px;\n  --sa-radius-pill:1000px;\n\n  --sa-glow-mint:0 0 48px 0 rgb(0 255 212 / .30), 0 0 0 4px rgb(0 255 212 / .10);\n  --sa-glow-purple:0 0 64px 0 rgb(170 133 236 / .35), 0 0 0 4px rgb(170 133 236 / .12);\n\n  --ease:cubic-bezier(.16,1,.3,1);\n}\n\n* { box-sizing:border-box; margin:0; padding:0; }\nhtml, body {\n  background:#000;\n  color:var(--sa-fg-1);\n  font-family:var(--sa-font);\n  -webkit-font-smoothing:antialiased;\n  overflow-x:hidden;\n}\n\n/* ── Layout layers ─────────────────────────────────────────── */\n#fx {\n  position:fixed; inset:0;\n  z-index:0;\n  pointer-events:none;\n}\n.flash {\n  position:fixed; inset:0;\n  z-index:5;\n  pointer-events:none;\n  opacity:0;\n  background:radial-gradient(circle at center,\n    rgba(255,255,255,1) 0%,\n    rgba(200,182,238,.95) 16%,\n    rgba(146,107,217,.55) 38%,\n    rgba(0,255,212,.18) 60%,\n    transparent 88%);\n}\n.flash.fire { animation:flashBurst .9s ease-out forwards; }\n@keyframes flashBurst {\n  0%   { opacity:0; transform:scale(.3); }\n  4%   { opacity:1; transform:scale(1.05); }\n  16%  { opacity:.85; transform:scale(1.15); }\n  100% { opacity:0; transform:scale(1.6); }\n}\n\n/* Camera shake */\nbody.shake { animation:shake .65s ease-out; }\n@keyframes shake {\n  0%,100%   { transform:translate(0,0); }\n  6%        { transform:translate(-14px,9px) rotate(-.3deg); }\n  18%       { transform:translate(13px,-10px) rotate(.3deg); }\n  30%       { transform:translate(-12px,-11px) rotate(-.2deg); }\n  44%       { transform:translate(11px,12px); }\n  58%       { transform:translate(-9px,7px); }\n  72%       { transform:translate(6px,-6px); }\n  86%       { transform:translate(-3px,3px); }\n}\n\n/* ── Stage container ───────────────────────────────────────── */\n.stage {\n  position:relative; z-index:2;\n  min-height:100vh;\n  display:flex;\n  flex-direction:column;\n  align-items:center;\n  justify-content:center;\n  padding:48px 24px;\n}\n\n/* ── Phase 1: connecting panel ─────────────────────────────── */\n.connect {\n  position:relative; z-index:2;\n  width:min(560px, 92vw);\n  text-align:center;\n  opacity:1;\n  transition:opacity .35s ease, transform .35s ease;\n}\n.connect.gone { opacity:0; transform:scale(.96); pointer-events:none; }\n\n.connect .brand {\n  display:inline-flex; align-items:center; gap:10px;\n  font-family:var(--sa-mono);\n  font-size:11px;\n  letter-spacing:.18em;\n  text-transform:uppercase;\n  color:var(--sa-fg-3);\n  margin-bottom:28px;\n}\n.connect .brand .sa-mark {\n  width:14px; height:18px;\n  color:var(--sa-purple-300);\n  filter:drop-shadow(0 0 6px rgb(170 133 236 / .6));\n}\n\n.connect h2 {\n  font-family:var(--sa-font);\n  font-weight:400;\n  font-size:28px;\n  letter-spacing:-.02em;\n  line-height:1.15;\n  color:var(--sa-fg-1);\n  margin-bottom:8px;\n}\n.connect .sub {\n  font-family:var(--sa-mono);\n  font-size:11px;\n  letter-spacing:.16em;\n  text-transform:uppercase;\n  color:var(--sa-fg-4);\n  margin-bottom:32px;\n}\n\n.bar-wrap {\n  height:2px;\n  width:100%;\n  background:var(--sa-tint-6);\n  border-radius:2px;\n  overflow:hidden;\n  position:relative;\n}\n.bar-fill {\n  position:absolute; inset:0;\n  width:0%;\n  background:linear-gradient(90deg, var(--sa-purple-500) 0%, var(--sa-mint-400) 100%);\n  box-shadow:0 0 24px rgb(170 133 236 / .5);\n  transition:width 1.45s cubic-bezier(.22,.61,.36,1);\n}\n\n.loading-list {\n  margin-top:18px;\n  height:18px;\n  font-family:var(--sa-mono);\n  font-size:11px;\n  letter-spacing:.04em;\n  color:var(--sa-fg-4);\n  text-align:left;\n  white-space:nowrap;\n  overflow:hidden;\n  position:relative;\n}\n.loading-list .ll-line {\n  position:absolute; left:0; right:0;\n  opacity:0;\n}\n.loading-list .ll-line.show { opacity:1; }\n.loading-list .ll-line .check {\n  color:var(--sa-mint-400);\n  margin-right:8px;\n}\n\n.connect.ready .bar-fill {\n  background:var(--sa-mint-400);\n  box-shadow:0 0 36px var(--sa-mint-400);\n}\n.connect.ready h2 .ready-tag {\n  color:var(--sa-mint-400);\n}\n\n/* ── Phase: HERO that lives over the constellation ─────────── */\n.hero {\n  position:fixed;\n  z-index:3;\n  inset:0;\n  display:flex;\n  flex-direction:column;\n  align-items:center;\n  justify-content:center;\n  gap:20px;\n  pointer-events:none;\n  padding:80px 24px 96px;\n}\n\n/* Hub mark — visual focal point above the stats */\n.hub {\n  flex:none;\n  width:120px; height:120px;\n  transform:scale(.4);\n  opacity:0;\n  transition:opacity .8s var(--ease), transform .9s var(--ease);\n  display:flex;\n  align-items:center;\n  justify-content:center;\n  position:relative;\n}\n.hub.show {\n  opacity:1;\n  transform:scale(1);\n}\n.hub .ring {\n  position:absolute; inset:0;\n  border-radius:50%;\n  border:1px solid var(--sa-stroke-purple-soft);\n}\n.hub .ring.r2 { inset:-18px; border-color:rgb(170 133 236 / .14); }\n.hub .ring.r3 { inset:-34px; border-color:rgb(0 255 212 / .10); }\n.hub .core {\n  width:62px; height:62px;\n  border-radius:50%;\n  background:radial-gradient(circle at 35% 30%, var(--sa-purple-300), var(--sa-purple-700) 70%);\n  box-shadow:\n    0 0 60px 4px rgb(170 133 236 / .6),\n    inset 0 -12px 24px rgb(61 0 128 / .8),\n    inset 0 10px 20px rgb(200 182 238 / .35);\n  display:flex; align-items:center; justify-content:center;\n  position:relative;\n}\n.hub .core::after {\n  content:\"\";\n  position:absolute;\n  width:12px; height:12px;\n  border-radius:50%;\n  background:var(--sa-mint-400);\n  box-shadow:0 0 18px var(--sa-mint-400), 0 0 4px var(--sa-mint-400);\n  animation:hubPulse 2.4s ease-in-out infinite;\n}\n@keyframes hubPulse {\n  0%,100% { transform:scale(1); opacity:1; }\n  50%     { transform:scale(.7); opacity:.55; }\n}\n\n/* HUB label below the orb */\n.hub-tag {\n  font-family:var(--sa-mono);\n  font-size:10px;\n  letter-spacing:.22em;\n  text-transform:uppercase;\n  color:var(--sa-fg-2);\n  white-space:nowrap;\n  opacity:0;\n  transition:opacity .6s var(--ease) .3s;\n  padding:7px 14px;\n  background:rgba(8, 5, 18, 0.78);\n  backdrop-filter:blur(10px);\n  -webkit-backdrop-filter:blur(10px);\n  border:1px solid rgba(170,133,236,0.25);\n  border-radius:var(--sa-radius-pill);\n}\n.hub-tag.show { opacity:1; }\n.hub-tag .pulse-dot {\n  display:inline-block; width:6px; height:6px;\n  border-radius:50%;\n  background:var(--sa-mint-400);\n  box-shadow:0 0 8px var(--sa-mint-400);\n  margin-right:8px;\n  vertical-align:middle;\n  animation:hubPulse 1.6s ease-in-out infinite;\n}\n\n/* HERO copy */\n.unlock {\n  width:min(720px, 92vw);\n  text-align:center;\n  opacity:0;\n  pointer-events:none;\n  transition:opacity .8s var(--ease);\n}\n.unlock.show { opacity:1; pointer-events:auto; }\n\n.unlock .eyebrow {\n  display:inline-flex; align-items:center; gap:10px;\n  padding:7px 14px 7px 10px;\n  background:rgb(0 255 212 / .08);\n  border:1px solid rgb(0 255 212 / .35);\n  border-radius:var(--sa-radius-pill);\n  font-family:var(--sa-mono);\n  font-size:10px;\n  letter-spacing:.22em;\n  text-transform:uppercase;\n  color:var(--sa-mint-400);\n  margin-bottom:22px;\n}\n.unlock .eyebrow .key {\n  display:inline-flex;\n  align-items:center; justify-content:center;\n  width:18px; height:18px;\n  border-radius:50%;\n  background:var(--sa-mint-400);\n  color:#0a1a14;\n  font-weight:700;\n  font-size:11px;\n}\n\n.unlock h1 {\n  font-family:var(--sa-font);\n  font-weight:400;\n  font-size:clamp(40px, 5.4vw, 72px);\n  letter-spacing:-.025em;\n  line-height:1.04;\n  color:var(--sa-fg-1);\n  margin-bottom:18px;\n  text-wrap:balance;\n  text-shadow:0 4px 24px #000, 0 0 80px rgba(0,0,0,0.98);\n}\n.unlock h1 .accent {\n  font-style:italic;\n  font-weight:500;\n  background:linear-gradient(120deg, var(--sa-purple-300) 0%, var(--sa-mint-400) 100%);\n  -webkit-background-clip:text;\n  background-clip:text;\n  -webkit-text-fill-color:transparent;\n}\n\n.unlock p {\n  font-size:17px;\n  line-height:1.5;\n  color:var(--sa-fg-2);\n  max-width:560px;\n  margin:0 auto 28px;\n  text-wrap:balance;\n  text-shadow:0 2px 16px #000, 0 0 40px #000;\n}\n\n.cta-row {\n  display:flex; gap:12px;\n  align-items:center;\n  justify-content:center;\n  flex-wrap:wrap;\n}\n.btn {\n  font-family:var(--sa-font);\n  font-weight:600;\n  font-size:15px;\n  letter-spacing:-.005em;\n  padding:14px 22px;\n  border-radius:var(--sa-radius-pill);\n  border:none;\n  cursor:pointer;\n  display:inline-flex;\n  align-items:center;\n  gap:9px;\n  text-decoration:none;\n  transition:transform .2s var(--ease), box-shadow .25s var(--ease), background .2s var(--ease), color .2s var(--ease);\n}\n.btn.primary {\n  background:var(--sa-mint-400);\n  color:#121212;\n  box-shadow:var(--sa-glow-mint);\n}\n.btn.primary:hover {\n  box-shadow:0 0 64px 0 rgb(0 255 212 / .5), 0 0 0 6px rgb(0 255 212 / .15);\n  transform:translateY(-1px);\n}\n.btn.ghost {\n  background:transparent;\n  color:var(--sa-fg-1);\n  border:1px solid var(--sa-stroke-purple-medium);\n}\n.btn.ghost:hover {\n  background:rgb(170 133 236 / .08);\n  border-color:var(--sa-purple-300);\n}\n.btn .arrow {\n  display:inline-block;\n  transition:transform .2s var(--ease);\n}\n.btn:hover .arrow { transform:translate(2px,-2px); }\n\n/* ── Numbers panel — orbits the hub ────────────────────────── */\n.stats {\n  display:grid;\n  grid-template-columns:repeat(4, 1fr);\n  gap:14px;\n  width:min(820px, 92vw);\n  opacity:0;\n  transform:translateY(8px);\n  transition:opacity .7s var(--ease), transform .7s var(--ease);\n}\n.stats.show { opacity:1; transform:translateY(0); }\n.stat {\n  position:relative;\n  text-align:center;\n  padding:18px 14px 14px;\n  background:rgba(8, 5, 18, 0.78);\n  backdrop-filter:blur(10px);\n  -webkit-backdrop-filter:blur(10px);\n  border:1px solid rgba(170,133,236,0.18);\n  border-radius:var(--sa-radius-md);\n  box-shadow:0 12px 36px rgba(0,0,0,0.45);\n}\n.stat-num {\n  font-family:var(--sa-font);\n  font-weight:500;\n  font-size:clamp(36px, 4.4vw, 56px);\n  letter-spacing:-.03em;\n  line-height:1;\n  color:var(--sa-fg-1);\n  font-variant-numeric:tabular-nums;\n  text-shadow:0 2px 24px #000, 0 0 60px rgba(0,0,0,0.95);\n}\n.stat-num .plus {\n  color:var(--sa-mint-400);\n  margin-left:2px;\n}\n.stat-label {\n  margin-top:8px;\n  font-family:var(--sa-mono);\n  font-size:10px;\n  letter-spacing:.16em;\n  text-transform:uppercase;\n  color:var(--sa-fg-4);\n}\n.stat-burst {\n  position:absolute;\n  left:50%; top:30%;\n  width:6px; height:6px;\n  border-radius:50%;\n  background:var(--sa-mint-400);\n  box-shadow:0 0 0 0 rgb(0 255 212 / .5);\n  pointer-events:none;\n  opacity:0;\n}\n.stat-burst.fire { animation:statBurst .9s ease-out; }\n@keyframes statBurst {\n  0%   { opacity:.9; transform:translate(-50%,-50%) scale(.4); box-shadow:0 0 0 0 rgb(0 255 212 / .6); }\n  100% { opacity:0;  transform:translate(-50%,-50%) scale(1);   box-shadow:0 0 0 60px rgb(0 255 212 / 0); }\n}\n\n/* ── Tool ticker ───────────────────────────────────────────── */\n.ticker {\n  position:fixed;\n  bottom:0; left:0; right:0;\n  height:46px;\n  background:linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,.92) 30%, rgba(0,0,0,.98) 100%);\n  border-top:1px solid var(--sa-tint-6);\n  z-index:3;\n  overflow:hidden;\n  display:flex;\n  align-items:center;\n  opacity:0;\n  transition:opacity .8s var(--ease);\n  pointer-events:none;\n}\n.ticker.show { opacity:1; }\n.ticker-track {\n  display:flex;\n  gap:36px;\n  white-space:nowrap;\n  animation:tickerScroll 60s linear infinite;\n  padding-left:36px;\n  font-family:var(--sa-mono);\n  font-size:11px;\n  letter-spacing:.04em;\n  color:var(--sa-fg-3);\n}\n.ticker-track .dot {\n  color:var(--sa-mint-400);\n  margin-right:4px;\n}\n@keyframes tickerScroll {\n  from { transform:translateX(0); }\n  to   { transform:translateX(-50%); }\n}\n\n/* ── Top chrome ────────────────────────────────────────────── */\n.top-chrome {\n  position:fixed;\n  top:20px; left:24px; right:24px;\n  z-index:6;\n  display:flex;\n  justify-content:space-between;\n  align-items:center;\n  pointer-events:none;\n}\n.top-chrome > * { pointer-events:auto; }\n.top-chrome .logo {\n  display:flex; align-items:center; gap:10px;\n  color:var(--sa-fg-2);\n  font-family:var(--sa-mono);\n  font-size:11px;\n  letter-spacing:.18em;\n  text-transform:uppercase;\n  opacity:0;\n  transition:opacity .6s ease;\n}\n.top-chrome .logo.show { opacity:1; }\n.top-chrome .logo .sa-mark {\n  width:14px; height:18px;\n  color:var(--sa-purple-300);\n  filter:drop-shadow(0 0 6px rgb(170 133 236 / .6));\n}\n\n.replay {\n  background:rgba(20,14,35,.65);\n  backdrop-filter:blur(8px);\n  -webkit-backdrop-filter:blur(8px);\n  border:1px solid var(--sa-stroke-1);\n  color:var(--sa-fg-3);\n  padding:8px 14px 8px 12px;\n  border-radius:var(--sa-radius-pill);\n  font-family:var(--sa-mono);\n  font-weight:500;\n  font-size:10px;\n  letter-spacing:.16em;\n  text-transform:uppercase;\n  cursor:pointer;\n  display:inline-flex;\n  align-items:center;\n  gap:8px;\n  opacity:0;\n  transition:opacity .3s ease, color .2s, border-color .2s, background .2s;\n}\n.replay.show { opacity:1; }\n.replay:hover {\n  color:var(--sa-fg-1);\n  border-color:var(--sa-stroke-purple-medium);\n  background:rgba(34,22,58,.8);\n}\n\n.top-actions {\n  display:flex;\n  align-items:center;\n  gap:8px;\n  pointer-events:auto;\n}\n.stop-mc {\n  background:rgba(20,14,35,.65);\n  backdrop-filter:blur(8px);\n  -webkit-backdrop-filter:blur(8px);\n  border:1px solid rgb(170 133 236 / .28);\n  color:var(--sa-fg-3);\n  padding:8px 12px;\n  border-radius:var(--sa-radius-pill);\n  font-family:var(--sa-mono);\n  font-weight:500;\n  font-size:10px;\n  letter-spacing:.16em;\n  text-transform:uppercase;\n  cursor:pointer;\n  display:inline-flex;\n  align-items:center;\n  gap:8px;\n  opacity:0;\n  transition:opacity .3s ease, color .2s, border-color .2s, background .2s;\n}\n.stop-mc.show { opacity:1; }\n.stop-mc:hover {\n  color:var(--sa-fg-1);\n  border-color:var(--sa-stroke-purple-medium);\n  background:rgba(34,22,58,.8);\n}\n\n.cmd-card .launch {\n  margin-top:14px;\n  font-family:var(--sa-mono);\n  font-size:10px;\n  letter-spacing:.16em;\n  text-transform:uppercase;\n  background:rgba(170,133,236,.10);\n  border:1px solid rgb(170 133 236 / .32);\n  color:var(--sa-purple-300);\n  padding:8px 12px;\n  border-radius:var(--sa-radius-pill);\n  cursor:pointer;\n  transition:color .2s, border-color .2s, background .2s;\n}\n.cmd-card .launch:hover {\n  color:var(--sa-fg-1);\n  border-color:var(--sa-stroke-purple-medium);\n  background:rgba(170,133,236,.18);\n}\n\n/* ── Below-fold content ────────────────────────────────────── */\n.below {\n  position:relative;\n  z-index:2;\n  width:100%;\n  max-width:1200px;\n  margin:0 auto;\n  padding:0 32px 96px;\n  opacity:0;\n  transition:opacity .6s ease;\n}\n.below.show { opacity:1; }\n\n.below-spacer { height:100vh; }\n\n.scroll-hint {\n  position:fixed;\n  bottom:60px;\n  left:50%;\n  transform:translateX(-50%);\n  font-family:var(--sa-mono);\n  font-size:10px;\n  letter-spacing:.22em;\n  text-transform:uppercase;\n  color:var(--sa-fg-4);\n  z-index:4;\n  opacity:0;\n  transition:opacity .6s ease;\n  pointer-events:none;\n  display:flex;\n  flex-direction:column;\n  align-items:center;\n  gap:6px;\n}\n.scroll-hint.show { opacity:1; }\n.scroll-hint .chev {\n  display:block;\n  width:1px; height:18px;\n  background:linear-gradient(180deg, var(--sa-fg-4), transparent);\n  animation:scrollHint 1.8s ease-in-out infinite;\n}\n@keyframes scrollHint {\n  0%,100% { transform:translateY(0); opacity:1; }\n  50%     { transform:translateY(8px); opacity:.4; }\n}\n\n.section-head {\n  display:flex;\n  align-items:baseline;\n  justify-content:space-between;\n  gap:24px;\n  margin:80px 0 28px;\n}\n.section-head .eyebrow {\n  font-family:var(--sa-mono);\n  font-size:11px;\n  letter-spacing:.16em;\n  text-transform:uppercase;\n  color:var(--sa-purple-300);\n  display:inline-flex;\n  align-items:center;\n  gap:14px;\n}\n.section-head .eyebrow::before {\n  content:\"\";\n  display:inline-block;\n  width:36px; height:1px;\n  background:l ss=\"cmd-card blue\" data-copy=\"/run-gbp\">\n      <div class=\"row1\"><div class=\"glyph\">▢<\u002Fdiv><div class=\"cmd\">/run-gbp<\u002Fdiv><\u002Fdiv>\n      <h3>Run GBP<\u002Fh3>\n      <p>Google Business Profile audit + cleanup. Categories, services, hours, reviews, posts.<\u002Fp>\n      <button class=\"copy\">Copy /run-gbp<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"cmd-card mint\" data-copy=\"/run-ppc\">\n      <div class=\"row1\"><div class=\"glyph\">▤<\u002Fdiv><div class=\"cmd\">/run-ppc<\u002Fdiv><\u002Fdiv>\n      <h3>Run PPC<\u002Fh3>\n      <p>Build and launch a PPC campaign end-to-end. Business, products, keywords, ad copy, campaign config.<\u002Fp>\n      <button class=\"copy\">Copy /run-ppc<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"cmd-card pink\" data-copy=\"/run-content\">\n      <div class=\"row1\"><div class=\"glyph\">◫<\u002Fdiv><div class=\"cmd\">/run-content<\u002Fdiv><\u002Fdiv>\n      <h3>Run Content<\u002Fh3>\n      <p>Keyword research → topical map → drafted articles → publish. Full content pipeline.<\u002Fp>\n      <button class=\"copy\">Copy /run-content<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"cmd-card\" data-copy=\"/run-pr\">\n      <div class=\"row1\"><div class=\"glyph\">◩<\u002Fdiv><div class=\"cmd\">/run-pr<\u002Fdiv><\u002Fdiv>\n      <h3>Digital PR<\u002Fh3>\n      <p>Press releases + cloud stacks + digital PR outreach. Seven-step authority workflow.<\u002Fp>\n      <button class=\"copy\">Copy /run-pr<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"cmd-card peach\" data-copy=\"/run-visibility\">\n      <div class=\"row1\"><div class=\"glyph\">◪<\u002Fdiv><div class=\"cmd\">/run-visibility<\u002Fdiv><\u002Fdiv>\n      <h3>AI Visibility<\u002Fh3>\n      <p>Track brand mentions across AI answer engines. Diagnose gaps. Find where competitors win in AI.<\u002Fp>\n      <button class=\"copy\">Copy /run-visibility<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <footer>\n    <span>Search Atlas MCP · mcp.searchatlas.com/mcp<\u002Fspan>\n    <span><a href=\"#\">Docs<\u002Fa> · <a href=\"#\">Help center<\u002Fa><\u002Fspan>\n  <\u002Ffooter>\n<\u002Fdiv>\n\n<!-- Toast -->\n<div class=\"toast\" id=\"toast\"><span class=\"check\">✓<\u002Fspan> <span id=\"toastText\">Copied<\u002Fspan><\u002Fdiv>\n\n<!-- Tool name registry — used by the explosion + ticker -->\n<script id=\"tools-data\" type=\"application/json\">\n[\n  \"Site Auditor\",\"Site Explorer\",\"Keyword Researcher\",\"Topical Map\",\"Content Brief\",\"Internal Linking\",\"Schema Generator\",\"Indexing API\",\"Backlink Monitor\",\"Rank Tracker\",\n  \"Competitor Gap\",\"Cannibalization\",\"SERP Analyzer\",\"Featured Snippet\",\"PAA Miner\",\"Hreflang Validator\",\"Canonical Audit\",\"Redirect Map\",\"404 Hunter\",\"Sitemap Builder\",\n  \"Robots Checker\",\"Speed Test\",\"Mobile Audit\",\"Core Web Vitals\",\"Image Optimizer\",\"Alt-Text AI\",\"Meta Generator\",\"FAQ Schema\",\"How-to Schema\",\"Local Pack\",\n  \"Citation Audit\",\"NAP Sync\",\"GBP Audit\",\"Review Replier\",\"GBP Posts\",\"GBP Categories\",\"Service Editor\",\"Hours Sync\",\"Q&A Manager\",\"Photo Optimizer\",\n  \"Location Map\",\"Campaign Builder\",\"Ad Copy AI\",\"Keyword Cluster\",\"Negative Keywords\",\"Quality Score\",\"Conversion Tracker\",\"Budget Planner\",\"A/B Variants\",\"Blog Idea Gen\",\n  \"Article Writer\",\"SEO Editor\",\"Plagiarism Check\",\"Content Refresh\",\"Topical Authority\",\"Pillar Pages\",\"Cluster Builder\",\"AI Mention Tracker\",\"Perplexity Rank\",\"ChatGPT Visibility\",\n  \"Brand Sentiment\",\"Answer Engine\",\"Press Release\",\"Cloud Stacks\",\"Outreach Lists\",\"Journalist Finder\",\"Backlink Pitch\",\"Authority Score\",\"Log Analyzer\",\"JS Render\",\n  \"Crawl Budget\",\"Indexability\",\"GSC Sync\",\"GA4 Stream\",\"Slack Notify\",\"Discord Notify\",\"Circle Post\",\"Email Drop\",\"Webhook\",\"Zapier\",\n  \"OTTO SEO\",\"OTTO Ads\",\"OTTO Pixel\",\"Shopify Sync\",\"WP Connector\",\"Site Migration\",\"HTTPS Audit\",\"JS Errors\",\"Crawler\",\"Atlas Brain\"\n]\n<\u002Fscript>\n\n<script>\n/* ════════════════════════════════════════════════════════════════\n   CINEMATIC ACTIVATION SEQUENCE\n   1. Connecting   → progress bar + tool list flickers\n   2. BIG BANG     → flash, shake, shockwaves\n   3. Explosion    → tools fly out as named particles\n   4. Constellation forms (galactic spiral)\n   5. Stats slam in, counting up\n   6. \"Unlocked\" hero appears with CTAs\n════════════════════════════════════════════════════════════════ */\n\nconst TOOLS = JSON.parse(document.getElementById('tools-data').textContent);\n\nconst $ = id => document.getElementById(id);\nconst canvas = $('fx'), ctx = canvas.getContext('2d');\nconst flashEl = $('flash');\nconst connectEl = $('connect');\nconst barFill = $('barFill');\nconst loadingList = $('loadingList');\nconst readyTag = $('readyTag');\nconst connectSub = $('connectSub');\nconst hub = $('hub');\nconst hubTag = $('hubTag');\nconst statsEl = $('stats');\nconst unlockEl = $('unlock');\nconst tickerEl = $('ticker');\nconst tickerTrack = $('tickerTrack');\nconst topLogo = $('topLogo');\nconst replayBtn = $('replay');\nconst stopMcBtn = $('stopMc');\nconst scrollHint = $('scrollHint');\nconst belowEl = $('below');\n\nlet cw, ch, cx, cy, dpr = Math.min(window.devicePixelRatio || 1, 2);\nfunction resize() {\n  cw = window.innerWidth;\n  ch = window.innerHeight;\n  canvas.width = cw * dpr;\n  canvas.height = ch * dpr;\n  canvas.style.width = cw + 'px';\n  canvas.style.height = ch + 'px';\n  ctx.setTransform(1,0,0,1,0,0);\n  ctx.scale(dpr, dpr);\n  cx = cw / 2;\n  cy = ch / 2;\n}\nresize();\nwindow.addEventListener('resize', () => { resize(); });\n\n/* ───────── Timeline (ms from animStart) ───────── */\nconst T = {\n  CONNECT_TYPE:    50,\n  BAR_START:       300,\n  BAR_END:         1750,      // bar full\n  READY:           1850,      // \"ready\" label flips on\n  BANG:            2150,      // BIG BANG begins\n  PARTICLES_GO:    2150,      // particles get velocity\n  HUB_SHOW:        3300,\n  STATS_SHOW:      3800,\n  STATS_COUNT_AT:  [3900, 4200, 4500, 4800],\n  UNLOCK_SHOW:     5400,\n  TICKER_SHOW:     5800,\n  SCROLL_HINT:     6400,\n  REPLAY_SHOW:     6400,\n  BELOW_SHOW:      6400,\n};\n\n/* ───────── Palette (vibrant warp) ───────── */\nconst PAL = [\n  [255, 255, 255],  // white — the bulk\n  [200, 230, 255],  // cool white\n  [188, 152, 255],  // purple-300\n  [170, 133, 236],  // purple-400\n  [0,   255, 212],  // mint\n  [0,   224, 255],  // electric cyan\n  [255, 80,  200],  // hot magenta\n  [255, 173, 219],  // pink\n  [255, 200, 80],   // warm spark (rare)\n];\nfunction palWeighted() {\n  const r = Math.random();\n  if (r < .40) return PAL[0];\n  if (r < .54) return PAL[1];\n  if (r < .64) return PAL[2];\n  if (r < .72) return PAL[3];\n  if (r < .82) return PAL[4];\n  if (r < .91) return PAL[5];\n  if (r < .96) return PAL[6];\n  if (r < .99) return PAL[7];\n  return PAL[8];\n}\n\n/* ───────── Hyperspace → calm constellation ─────────\n   Stars warp outward from center, decelerate, then settle into a\n   slow circular orbit around the hub. Three phases:\n     A (0–WARP_END):     accelerating warp streaks\n     B (–SETTLE_END):    decelerating, easing toward orbital position\n     C (after):           slow circular constellation drift\n*/\nconst NUM_STARS = 220;\nconst WARP_END   = 1400;  // ms after bang\nconst SETTLE_END = 2900;  // ms after bang\nlet stars = [];\nlet shockwaves = [];\n\nfunction rand(a,b) { return a + Math.random() * (b - a); }\nfunction pick(arr) { return arr[(Math.random()*arr.length)|0]; }\n\nfunction freshStar(s) {\n  s.angle = Math.random() * Math.PI * 2;\n  s.dist = 0;\n  s.vRadial = rand(180, 340);\n  s.accel   = rand(1500, 2600);   // strong warp punch\n  // Orbital home — ring distribution around hub\n  const minR = 110;\n  const maxR = Math.min(cw, ch) * 0.42;\n  s.orbitR = minR + Math.sqrt(Math.random()) * (maxR - minR);\n  s.orbitAngle = s.angle + rand(-0.45, 0.45);\n  s.orbitSpeed = rand(0.020, 0.065) * (Math.random() < .5 ? 1 : -1); // rad/sec, slow\n  s.color = palWeighted();\n  s.size  = rand(0.7, 1.7) + (Math.random() < 0.08 ? 1.4 : 0);\n  s.brightness = rand(0.55, 1);\n  s.phase = rand(0, Math.PI * 2);\n  s.twinkleHz = rand(0.4, 1.8);\n  // ~6% of stars carry a persistent tool name (the \"named stars\")\n  s.label = Math.random() < 0.055 ? pick(TOOLS) : null;\n  return s;\n}\n\nfunction buildStars() {\n  stars = [];\n  for (let i = 0; i < NUM_STARS; i++) {\n    stars.push(freshStar({}));\n  }\n}\nbuildStars();\n\nfunction roundRect(c, x, y, w, h, r) {\n  c.beginPath();\n  c.moveTo(x + r, y);\n  c.lineTo(x + w - r, y);\n  c.quadraticCurveTo(x + w, y, x + w, y + r);\n  c.lineTo(x + w, y + h - r);\n  c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);\n  c.lineTo(x + r, y + h);\n  c.quadraticCurveTo(x, y + h, x, y + h - r);\n  c.lineTo(x, y + r);\n  c.quadraticCurveTo(x, y, x + r, y);\n  c.closePath();\n}\n\n/* ───────── Loading list flicker (during phase 1) ───────── */\nfunction startLoadingList() {\n  const lines = [\n    'connect tools.atlas → 643 tools', 'mount workflows.atlas → 47',\n    'mount slash.atlas → 24 commands', 'auth claude.ai · ok',\n    'index OTTO SEO · ok', 'index Atlas Brain · ok',\n    'attach GBP suite · 12 tools', 'attach PPC builder · 8 tools',\n    'attach Site Auditor · ok', 'attach AI Visibility · ok',\n    'compile constellation · 600+'\n  ];\n  let i = 0;\n  // Spin lines fast for ~1.4s\n  const start = performance.now();\n  function nextLine() {\n    if (performance.now() - start > 1500) return;\n    const el = document.createElement('div');\n    el.className = 'll-line show';\n    el.innerHTML = `<span class=\"check\">›<\u002Fspan>${lines[i % lines.length]}`;\n    loadingList.innerHTML = '';\n    loadingList.appendChild(el);\n    i++;\n    setTimeout(nextLine, 130);\n  }\n  nextLine();\n}\n\n/* ───────── Big bang sequence ───────── */\nlet animStart = 0;\nlet timers = [];\nfunction setT(fn, ms) { timers.push(setTimeout(fn, ms)); }\nfunction clearT() { timers.forEach(clearTimeout); timers = []; }\n\nfunction fireShockwaves() {\n  shockwaves = [\n    { t: 0, life: 800, max: Math.max(cw,ch)*0.9, color:[255,255,255], width: 2.0 },\n    { t: 80, life: 900, max: Math.max(cw,ch)*1.0, color:[170,133,236], width: 1.5 },\n    { t: 180, life: 950, max: Math.max(cw,ch)*1.1, color:[0,255,212], width: 1.2 },\n  ];\n}\n\nfunction runTimeline() {\n  // Phase 1 — bar fills\n  setT(() => { barFill.style.width = '100%'; }, T.BAR_START);\n  setT(() => { startLoadingList(); }, T.CONNECT_TYPE);\n  setT(() => {\n    readyTag.style.display = 'inline';\n    connectEl.classList.add('ready');\n    connectSub.textContent = 'all systems online · mcp.searchatlas.com';\n  }, T.READY);\n\n  // The bang\n  setT(() => {\n    connectEl.classList.add('gone');\n    topLogo.classList.add('show');\n    flashEl.classList.remove('fire');\n    void flashEl.offsetWidth;\n    flashEl.classList.add('fire');\n    document.body.classList.add('shake');\n    setT(() => document.body.classList.remove('shake'), 660);\n    fireShockwaves();\n    // Re-seed animation t0 for particles\n    particleT0 = performance.now();\n  }, T.BANG);\n\n  setT(() => { hub.classList.add('show'); hubTag.classList.add('show'); }, T.HUB_SHOW);\n  setT(() => statsEl.classList.add('show'), T.STATS_SHOW);\n\n  // Stagger count animations\n  const statEls = statsEl.querySelectorAll('.stat');\n  T.STATS_COUNT_AT.forEach((at, i) => {\n    setT(() => animateStat(statEls[i]), at);\n  });\n\n  setT(() => unlockEl.classList.add('show'), T.UNLOCK_SHOW);\n  setT(() => tickerEl.classList.add('show'), T.TICKER_SHOW);\n  setT(() => scrollHint.classList.add('show'), T.SCROLL_HINT);\n  setT(() => replayBtn.classList.add('show'), T.REPLAY_SHOW);\n  setT(() => stopMcBtn.classList.add('show'), T.REPLAY_SHOW);\n  setT(() => belowEl.classList.add('show'), T.BELOW_SHOW);\n}\n\nfunction animateStat(stat) {\n  const target = +stat.dataset.target;\n  const numEl = stat.querySelector('.num');\n  const burst = stat.querySelector('.stat-burst');\n  const start = performance.now();\n  const dur = 1100;\n  function step(now) {\n    const p = Math.min(1, (now - start) / dur);\n    const eased = 1 - Math.pow(1 - p, 3);\n    numEl.textContent = Math.floor(target * eased).toLocaleString();\n    if (p < 1) requestAnimationFrame(step);\n    else {\n      numEl.textContent = target.toLocaleString();\n      burst.classList.remove('fire');\n      void burst.offsetWidth;\n      burst.classList.add('fire');\n    }\n  }\n  requestAnimationFrame(step);\n}\n\n/* ───────── Build ticker ───────── */\nfunction buildTicker() {\n  const seg = TOOLS.concat(TOOLS).map(t => `<span class=\"tk\"><span class=\"dot\">●<\u002Fspan>${t}<\u002Fspan>`).join('');\n  tickerTrack.innerHTML = seg;\n}\nbuildTicker();\n\n/* ════════════════════════════════════════════════════════════════\n   DRAW LOOP\n════════════════════════════════════════════════════════════════ */\nlet lastDraw = performance.now();\n\nfunction draw(now) {\n  const elapsed = now - animStart;\n  const dt = Math.min((now - lastDraw) / 1000, 0.05);\n  lastDraw = now;\n\n  // Pre-bang: pure black\n  if (elapsed < T.BANG) {\n    ctx.fillStyle = '#000';\n    ctx.fillRect(0, 0, cw, ch);\n    requestAnimationFrame(draw);\n    return;\n  }\n\n  const timeSinceBang = elapsed - T.BANG;\n\n  // Motion-blur fade: long streaks during warp, medium during settle,\n  // basically clean during the calm constellation phase.\n  let fadeAlpha;\n  if (timeSinceBang < 250)              fadeAlpha = .14;\n  else if (timeSinceBang < WARP_END)    fadeAlpha = .08;   // long streaks\n  else if (timeSinceBang < SETTLE_END)  fadeAlpha = .14;   // medium\n  else                                   fadeAlpha = .32;   // calm: minimal trails\n  ctx.fillStyle = `rgba(0, 0, 0, ${fadeAlpha})`;\n  ctx.fillRect(0, 0, cw, ch);\n\n  // Deep-space radial wash — pulls eye to vanishing point\n  {\n    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(cw, ch) * 0.65);\n    g.addColorStop(0,   'rgba(50, 18, 100, 0.22)');\n    g.addColorStop(0.5, 'rgba(20, 8, 50, 0.10)');\n    g.addColorStop(1,   'rgba(0, 0, 0, 0)');\n    ctx.fillStyle = g;\n    ctx.fillRect(0, 0, cw, ch);\n  }\n\n  ctx.save();\n  ctx.translate(cx, cy);\n\n  // ── Shockwaves (only at moment of bang)\n  for (const sw of shockwaves) {\n    sw.t += (now - (sw._lastT || now));\n    sw._lastT = now;\n  }\n  for (const sw of shockwaves) {\n    const tNorm = sw.t / sw.life;\n    if (tNorm <= 0 || tNorm >= 1) continue;\n    const eased = 1 - Math.pow(1 - tNorm, 3);\n    const r = eased * sw.max;\n    const a = (1 - tNorm) * 0.85;\n    ctx.strokeStyle = `rgba(${sw.color.join(',')}, ${a.toFixed(3)})`;\n    ctx.lineWidth = sw.width * (1 + 1.2 * tNorm);\n    ctx.beginPath();\n    ctx.arc(0, 0, r, 0, Math.PI * 2);\n    ctx.stroke();\n  }\n  shockwaves = shockwaves.filter(sw => sw.t < sw.life);\n\n  // ── Warp → constellation per-star update + render\n  const tSec = timeSinceBang / 1000;\n  const inWarp   = timeSinceBang < WARP_END;\n  const inSettle = !inWarp && timeSinceBang < SETTLE_END;\n  const inCalm   = !inWarp && !inSettle;\n\n  let blend;\n  if (inWarp)        blend = 0;\n  else if (inSettle) blend = 1 - Math.pow(1 - (timeSinceBang - WARP_END) / (SETTLE_END - WARP_END), 3);\n  else               blend = 1;\n\n  ctx.lineCap = 'round';\n\n  for (const s of stars) {\n    // Phase A: accelerate outward\n    if (inWarp) {\n      s.vRadial += s.accel * dt;\n      s.dist    += s.vRadial * dt;\n    }\n\n    // Warp track position (held after warp ends)\n    const wx = Math.cos(s.angle) * s.dist;\n    const wy = Math.sin(s.angle) * s.dist;\n\n    // Orbital track position — angle advances slowly each frame\n    const orbA = s.orbitAngle + tSec * s.orbitSpeed;\n    const ox = Math.cos(orbA) * s.orbitR;\n    const oy = Math.sin(orbA) * s.orbitR;\n\n    // Blend warp → orbital\n    const px = wx + (ox - wx) * blend;\n    const py = wy + (oy - wy) * blend;\n\n    // Brightness ramp (warp: by distance, calm: full + twinkle)\n    const rampWarp = Math.min(1, s.dist / 160);\n    const twinkle = inCalm ? (0.78 + 0.22 * Math.sin(elapsed * 0.001 * s.twinkleHz + s.phase)) : 1;\n    const b = (rampWarp * (1 - blend) + 1 * blend) * s.brightness * twinkle;\n    if (b < 0.03) continue;\n\n    // Streak — only during the warp punch\n    if (inWarp) {\n      const tail = Math.min(s.dist, s.vRadial * 0.07 + 8);\n      const oldD = s.dist - tail;\n      const x1 = Math.cos(s.angle) * oldD, y1 = Math.sin(s.angle) * oldD;\n      const grad = ctx.createLinearGradient(x1, y1, px, py);\n      grad.addColorStop(0,    `rgba(${s.color.join(',')}, 0)`);\n      grad.addColorStop(0.65, `rgba(${s.color.join(',')}, ${(b * 0.88).toFixed(3)})`);\n      grad.addColorStop(1,    `rgba(255, 255, 255, ${b.toFixed(3)})`);\n      ctx.strokeStyle = grad;\n      ctx.lineWidth = s.size * (1 + s.dist / 420);\n      ctx.beginPath();\n      ctx.moveTo(x1, y1);\n      ctx.lineTo(px, py);\n      ctx.stroke();\n    }\n\n    // Halo (brighter stars only)\n    if (b > 0.5) {\n      const haloR = s.size * (inCalm ? 5.5 : 7);\n      const hg = ctx.createRadialGradient(px, py, 0, px, py, haloR);\n      hg.addColorStop(0, `rgba(${s.color.join(',')}, ${(b * 0.38).toFixed(3)})`);\n      hg.addColorStop(1, `rgba(${s.color.join(',')}, 0)`);\n      ctx.fillStyle = hg;\n      ctx.beginPath();\n      ctx.arc(px, py, haloR, 0, Math.PI * 2);\n      ctx.fill();\n    }\n\n    // Bright pinpoint\n    ctx.fillStyle = `rgba(255, 255, 255, ${(b * 0.92).toFixed(3)})`;\n    ctx.beginPath();\n    ctx.arc(px, py, s.size * (inCalm ? 0.7 : 0.6), 0, Math.PI * 2);\n    ctx.fill();\n\n    // Persistent label — only in calm phase, faded in subtly\n    if (s.label && inCalm) {\n      const labelFade = Math.min(1, (timeSinceBang - SETTLE_END) / 700);\n      const la = labelFade * 0.55 * (0.85 + 0.15 * Math.sin(elapsed * 0.0012 + s.phase));\n      if (la > 0.03) {\n        ctx.font = '500 11px \"Inter Tight\", system-ui, sans-serif';\n        ctx.textBaseline = 'middle';\n        ctx.textAlign = px >= 0 ? 'left' : 'right';\n        const lx = px + (px >= 0 ? 10 : -10);\n        ctx.fillStyle = `rgba(255, 255, 255, ${la.toFixed(3)})`;\n        ctx.fillText(s.label, lx, py);\n      }\n    }\n  }\n\n  ctx.restore();\n\n  // ── Hub aura beneath the DOM hub\n  let hubI = 0;\n  if (timeSinceBang > 500) hubI = Math.min(1, (timeSinceBang - 500) / 1300);\n  if (hubI > 0) {\n    const pulse = 1 + Math.sin(elapsed * 0.0025) * 0.06;\n    const r = 240 * pulse;\n    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);\n    g.addColorStop(0,    `rgba(170, 133, 236, ${(hubI * 0.42).toFixed(3)})`);\n    g.addColorStop(0.35, `rgba(109, 0, 218, ${(hubI * 0.22).toFixed(3)})`);\n    g.addColorStop(0.75, `rgba(0, 255, 212, ${(hubI * 0.06).toFixed(3)})`);\n    g.addColorStop(1,    'rgba(0, 0, 0, 0)');\n    ctx.fillStyle = g;\n    ctx.fillRect(0, 0, cw, ch);\n  }\n\n  // ── Vanishing point — a tight dark spot at center gives the tunnel depth\n  if (timeSinceBang > 250) {\n    const vp = Math.min(1, (timeSinceBang - 250) / 700);\n    const r = 50 * vp;\n    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);\n    g.addColorStop(0, `rgba(0, 0, 0, ${(vp * 0.85).toFixed(3)})`);\n    g.addColorStop(1, 'rgba(0, 0, 0, 0)');\n    ctx.fillStyle = g;\n    ctx.fillRect(0, 0, cw, ch);\n  }\n\n  requestAnimationFrame(draw);\n}\n\n/* ════════════════════════════════════════════════════════════════\n   START / REPLAY\n════════════════════════════════════════════════════════════════ */\nfunction reset() {\n  clearT();\n  // Reset state\n  stars = [];\n  shockwaves = [];\n  buildStars();\n  flashEl.classList.remove('fire');\n  document.body.classList.remove('shake');\n  connectEl.classList.remove('gone', 'ready');\n  readyTag.style.display = 'none';\n  connectSub.textContent = 'Negotiating handshake · mcp.searchatlas.com';\n  barFill.style.width = '0%';\n  loadingList.innerHTML = '';\n  hub.classList.remove('show');\n  hubTag.classList.remove('show');\n  statsEl.classList.remove('show');\n  unlockEl.classList.remove('show');\n  tickerEl.classList.remove('show');\n  scrollHint.classList.remove('show');\n  topLogo.classList.remove('show');\n  replayBtn.classList.remove('show');\n  stopMcBtn.classList.remove('show');\n  belowEl.classList.remove('show');\n  statsEl.querySelectorAll('.num').forEach(n => n.textContent = '0');\n  statsEl.querySelectorAll('.stat-burst').forEach(b => b.classList.remove('fire'));\n  ctx.fillStyle = '#000';\n  ctx.fillRect(0,0,cw,ch);\n  // Scroll back to top on replay\n  window.scrollTo({top:0, behavior:'instant'});\n  animStart = performance.now();\n  runTimeline();\n}\n\nreset();\nrequestAnimationFrame(draw);\n\nreplayBtn.addEventListener('click', reset);\n\n/* ════════════════════════════════════════════════════════════════\n   COPY-TO-CLIPBOARD\n════════════════════════════════════════════════════════════════ */\nconst toast = $('toast');\nconst toastText = $('toastText');\nlet toastTimer = null;\nfunction showToast(msg) {\n  toastText.textContent = msg;\n  toast.classList.add('show');\n  clearTimeout(toastTimer);\n  toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);\n}\nfunction doCopy(txt) {\n  if (!txt) return;\n  const ok = () => showToast(`Copied: ${txt}`);\n  const fail = () => {\n    // Fallback for non-secure contexts\n    try {\n      const ta = document.createElement('textarea');\n      ta.value = txt;\n      ta.style.position = 'fixed';\n      ta.style.opacity = '0';\n      document.body.appendChild(ta);\n      ta.select();\n      document.execCommand('copy');\n      document.body.removeChild(ta);\n      ok();\n    } catch (e) {\n      showToast('Press \\u2318+C to copy');\n    }\n  };\n  if (navigator.clipboard && window.isSecureContext) {\n    navigator.clipboard.writeText(txt).then(ok).catch(fail);\n  } else {\n    fail();\n  }\n}\n/* ════════════════════════════════════════════════════════════════\n   MISSION CONTROL BRIDGES\n   Cards with [data-bridge-port] launch a local bridge in a new tab\n   instead of copying a slash command. Health-check first; if down,\n   show a toast nudging the user to start the bridges.\n════════════════════════════════════════════════════════════════ */\nconst BRIDGE_PORTS = [8765, 8766, 8767];\n\nasync function launchBridge(card, port) {\n  try {\n    const ctrl = new AbortController();\n    const t = setTimeout(() => ctrl.abort(), 1000);\n    const res = await fetch(`http://localhost:${port}/api/health`, { signal: ctrl.signal, cache: 'no-store' });\n    clearTimeout(t);\n    if (res && res.ok) {\n      window.open(`http://localhost:${port}/`, '_blank');\n      return;\n    }\n  } catch (e) { /* fall through to toast */ }\n  showToast('Start Mission Control bridges first — double-click "SearchAtlas Mission Control.command" on your Desktop, then refresh this page.');\n}\n\nasync function stopMissionControl() {\n  await Promise.all(BRIDGE_PORTS.map(p =>\n    fetch(`http://localhost:${p}/api/shutdown`, { method: 'POST' }).catch(() => null)\n  ));\n  showToast('Mission Control bridges stopped.');\n}\n\ndocument.querySelectorAll('.cmd-card').forEach(card => {\n  const portAttr = card.dataset.bridgePort;\n  if (portAttr) {\n    const port = parseInt(portAttr, 10);\n    const fire = e => { e.preventDefault(); e.stopPropagation(); launchBridge(card, port); };\n    card.addEventListener('click', fire);\n    const btn = card.querySelector('.launch');\n    if (btn) { btn.setAttribute('type', 'button'); btn.addEventListener('click', fire); }\n    return;\n  }\n  const txt = card.dataset.copy;\n  card.addEventListener('click', e => {\n    e.preventDefault();\n    doCopy(txt);\n  });\n  // Also bind the inner copy button explicitly so it works regardless\n  const btn = card.querySelector('.copy');\n  if (btn) {\n    btn.setAttribute('type', 'button');\n    btn.addEventListener('click', e => {\n      e.preventDefault();\n      e.stopPropagation();\n      doCopy(txt);\n    });\n  }\n});\n\nstopMcBtn.addEventListener('click', e => {\n  e.preventDefault();\n  stopMissionControl();\n});\n\n// Best-effort shutdown when the tab closes. sendBeacon is more reliable\n// than fetch in unload contexts.\nwindow.addEventListener('beforeunload', () => {\n  BRIDGE_PORTS.forEach(p => {\n    try { navigator.sendBeacon(`http://localhost:${p}/api/shutdown`); } catch (e) {}\n  });\n});\n\n/* ════════════════════════════════════════════════════════════════\n   BRIDGE WATCHDOG — polls /api/health every 15s. If any bridge\n   transitions from \"was up\" to \"is down\" we surface a banner\n   so the user knows their wizards stopped working. Banner does NOT\n   appear on initial page load if bridges were never up — that's the\n   normal \"not yet authenticated / not yet started\" state and the\n   card-click toast already handles it.\n════════════════════════════════════════════════════════════════ */\nconst _bcbState = { everUp: {}, lastDown: {}, dismissed: false, timerId: null };\nBRIDGE_PORTS.forEach(p => { _bcbState.everUp[p] = false; _bcbState.lastDown[p] = false; });\n\nasync function _bcbProbe(port) {\n  try {\n    const ctrl = new AbortController();\n    const t = setTimeout(() => ctrl.abort(), 1200);\n    const res = await fetch(`http://localhost:${port}/api/health`, { signal: ctrl.signal });\n    clearTimeout(t);\n    return res.ok;\n  } catch (e) { return false; }\n}\n\nasync function _bcbTick() {\n  if (_bcbState.dismissed) return;\n  const downNow = [];\n  await Promise.all(BRIDGE_PORTS.map(async (port) => {\n    const up = await _bcbProbe(port);\n    if (up) {\n      _bcbState.everUp[port] = true;\n      _bcbState.lastDown[port] = false;\n    } else if (_bcbState.everUp[port]) {\n      // Only flag as down if we previously saw it up.\n      _bcbState.lastDown[port] = true;\n      downNow.push(port);\n    }\n  }));\n  const banner = document.getElementById('bridgeCrashBanner');\n  if (!banner) return;\n  if (downNow.length > 0) {\n    const list = document.getElementById('bcbList');\n    if (list) {\n      const names = downNow.map(p => p === 8765 ? 'Onboard' : p === 8766 ? 'Build' : p === 8767 ? 'Rebuild' : `port ${p}`);\n      list.textContent = '(' + names.join(', ') + ')';\n    }\n    banner.classList.add('is-visible');\n  } else {\n    banner.classList.remove('is-visible');\n  }\n}\n\nfunction _bcbStart() {\n  if (_bcbState.timerId) return;\n  // First probe after 3s (give bridges time to spin up); then every 15s.\n  setTimeout(_bcbTick, 3000);\n  _bcbState.timerId = setInterval(_bcbTick, 15000);\n  const dismiss = document.getElementById('bcbDismiss');\n  if (dismiss) dismiss.addEventListener('click', () => {\n    _bcbState.dismissed = true;\n    const b = document.getElementById('bridgeCrashBanner');\n    if (b) b.classList.remove('is-visible');\n  });\n  const refresh = document.getElementById('bcbRefresh');\n  if (refresh) refresh.addEventListener('click', () => { window.location.reload(); });\n}\n_bcbStart();\n\n\n/* ════════════════════════════════════════════════════════════════\n   SCROLL: when user scrolls below the fold, snap hub etc. into\n   background so content reads cleanly\n════════════════════════════════════════════════════════════════ */\nwindow.addEventListener('scroll', () => {\n  const y = window.scrollY;\n  // Fade out hero overlays as user scrolls past first viewport\n  const fadeStart = window.innerHeight * 0.2;\n  const fadeEnd = window.innerHeight * 0.85;\n  const p = Math.min(1, Math.max(0, (y - fadeStart) / (fadeEnd - fadeStart)));\n  unlockEl.style.opacity = unlockEl.classList.contains('show') ? (1 - p).toFixed(3) : '0';\n  hub.style.opacity = hub.classList.contains('show') ? (1 - p * 0.65).toFixed(3) : '0';\n  hubTag.style.opacity = hubTag.classList.contains('show') ? (1 - p).toFixed(3) : '0';\n  statsEl.style.opacity = statsEl.classList.contains('show') ? (1 - p).toFixed(3) : '0';\n  scrollHint.style.opacity = (1 - p).toFixed(3);\n  // Hide ticker too when below\n  tickerEl.style.opacity = tickerEl.classList.contains('show') ? (1 - p * 0.7).toFixed(3) : '0';\n});\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
